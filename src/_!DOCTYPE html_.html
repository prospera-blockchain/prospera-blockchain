<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Prospera ($PRSP) - Official Global Token Sale</title>
                <script src="https://jsdelivr.net"></script>
                    <script src="https://tailwindcss.com"></script>
                        <style>
                                body { background-color: #0b0f19; color: #f3f4f6; font-family: sans-serif; }
                                    </style>
                                    </head>
                                    <body class="flex flex-col items-center justify-center min-h-screen p-4">

                                        <!-- Header & Brand -->
                                            <div class="text-center mb-8">
                                                    <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-emerald-500 mb-2">PROSPERA ($PRSP)</h1>
                                                            <p class="text-gray-400 text-sm tracking-widest uppercase">Layer 1 Next-Gen Blockchain Ecosystem</p>
                                                                </div>

                                                                    <!-- Main Card -->
                                                                        <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6 w-full max-w-md shadow-2xl text-center">
                                                                                <div class="mb-4">
                                                                                            <span class="text-xs bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-3 py-1 rounded-full font-semibold">PRESALE IS ACTIVE</span>
                                                                                                    </div>
                                                                                                            
                                                                                                                    <p class="text-gray-400 text-sm mb-1">Current Price</p>
                                                                                                                            <h2 class="text-3xl font-bold text-white mb-6">$0.0116 <span class="text-sm font-normal text-gray-500">USDT</span></h2>

                                                                                                                                    <!-- Action Area -->
                                                                                                                                            <button id="connectBtn" class="w-full bg-gradient-to-r from-emerald-500 to-green-600 hover:from-emerald-600 hover:to-green-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg transition duration-200 mb-4 flex items-center justify-center gap-2">
                                                                                                                                                        Connect Web3 Wallet
                                                                                                                                                                </button>

                                                                                                                                                                        <div id="buySection" class="hidden space-y-4 pt-2 border-t border-gray-800">
                                                                                                                                                                                    <div>
                                                                                                                                                                                                    <label class="block text-left text-xs font-semibold text-gray-400 mb-1">Amount to Spend (USDT)</label>
                                                                                                                                                                                                                    <input type="number" id="usdtAmount" value="100" class="w-full bg-gray-950 border border-gray-800 rounded-xl py-3 px-4 text-white font-bold focus:outline-none focus:border-emerald-500 text-center">
                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                            <button id="buyBtn" class="w-full bg-white hover:bg-gray-100 text-gray-950 font-bold py-3 px-4 rounded-xl transition duration-200">
                                                                                                                                                                                                                                                            Buy $PRSP Instantly
                                                                                                                                                                                                                                                                        </button>
                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                        <!-- Footer Security Message -->
                                                                                                                                                                                                                                                                                            <p class="text-xs text-gray-600 mt-6 max-w-xs text-center">Secure end-to-end encrypted connection served by global decentralized smart nodes.</p>

                                                                                                                                                                                                                                                                                                <script>
                                                                                                                                                                                                                                                                                                        const connectBtn = document.getElementById('connectBtn');
                                                                                                                                                                                                                                                                                                                const buySection = document.getElementById('buySection');
                                                                                                                                                                                                                                                                                                                        const buyBtn = document.getElementById('buyBtn');
                                                                                                                                                                                                                                                                                                                                const usdtAmount = document.getElementById('usdtAmount');
                                                                                                                                                                                                                                                                                                                                        let walletAddress = "";

                                                                                                                                                                                                                                                                                                                                                // Fungsi menghubungkan dompet kripto global (MetaMask/TrustWallet)
                                                                                                                                                                                                                                                                                                                                                        connectBtn.addEventListener('click', async () => {
                                                                                                                                                                                                                                                                                                                                                                        if (window.ethereum) {
                                                                                                                                                                                                                                                                                                                                                                                            try {
                                                                                                                                                                                                                                                                                                                                                                                                                    const provider = new ethers.providers.Web3Provider(window.ethereum);
                                                                                                                                                                                                                                                                                                                                                                                                                                        const accounts = await provider.send("eth_requestAccounts", []);
                                                                                                                                                                                                                                                                                                                                                                                                                                                            walletAddress = accounts[0];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                connectBtn.innerHTML = `Connected: ${walletAddress.substring(0,6)}...${walletAddress.substring(walletAddress.length - 4)}`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    connectBtn.classList.replace('from-emerald-500', 'from-gray-800');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        connectBtn.classList.replace('to-green-600', 'to-gray-900');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            buySection.classList.remove('hidden');
                                                                                                                                                                                                                                                                                                                                                                                            } catch (error) {
                                                                                                                                                                                                                                                                                                                                                                                                                    alert("Wallet connection rejected.");
                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                        } else {
                                                                                                                                                                                                                                                                                                                                                                                            alert("Please open this website inside MetaMask Browser or Trust Wallet Browser to buy.");
                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                        });

                                                                                                                                                                                                                                                                                                                                                                // Fungsi menembak data orderan ke Backend Rust di Codespaces Anda
                                                                                                                                                                                                                                                                                                                                                                        buyBtn.addEventListener('click', async () => {
                                                                                                                                                                                                                                                                                                                                                                                        const amount = usdtAmount.value;
                                                                                                                                                                                                                                                                                                                                                                                                    buyBtn.innerHTML = "Processing Order...";
                                                                                                                                                                                                                                                                                                                                                                                                                buyBtn.disabled = true;

                                                                                                                                                                                                                                                                                                                                                                                                                            // GANTI LINK DI BAWAH INI DENGAN LINK .app.github.dev ANDA YANG SUDAH PUBLIC
                                                                                                                                                                                                                                                                                                                                                                                                                                        const BACKEND_URL = "https://github.dev";

                                                                                                                                                                                                                                                                                                                                                                                                                                                    try {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const response = await fetch(BACKEND_URL, {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                method: 'POST',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    headers: { 'Content-Type': 'application/json' },
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        body: JSON.stringify({
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    jumlah_usdt: parseFloat(amount),
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            alamat_wallet_pembeli: walletAddress
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        })
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const result = await response.text();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        alert(result);
                                                                                                                                                                                                                                                                                                                                                                                                                                                    } catch (error) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        alert("Transaction Simulated: Order pushed to network validation.");
                                                                                                                                                                                                                                                                                                                                                                                                                                                    } finally {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        buyBtn.innerHTML = "Buy $PRSP Instantly";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        buyBtn.disabled = false;
                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                        });
                                                                                                                                                                                                                                                                                                                                                                            </script>
                                                                                                                                                                                                                                                                                                                                                                            </body>
                                                                                                                                                                                                                                                                                                                                                                            </html>
                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        })
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        })
                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                        })
                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                        })
