<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prospera Quantum Wallet | Layer 1 Ecosystem</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg-main: #060913;
            --card-bg: rgba(13, 20, 38, 0.6);
            --border-color: rgba(56, 189, 248, 0.15);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-cyan: #06b6d4;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
        }
        body { 
            background-color: var(--bg-main); 
            color: var(--text-primary); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            text-align: center; 
            padding: 24px 16px; 
            margin: 0;
            background-image: radial-gradient(circle at top right, rgba(59, 130, 246, 0.08), transparent 40%);
        }
        .container { max-width: 440px; margin: 0 auto; }
        .brand-section { margin: 20px 0; }
        .logo-symbol { font-size: 32px; font-weight: 800; background: linear-gradient(135deg, #06b6d4, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-title { font-weight: 800; font-size: 22px; letter-spacing: 2px; margin: 0; }
        .badge-l1 { background: rgba(6,182,212,0.15); border: 1px solid var(--border-color); color: #38bdf8; font-size: 10px; padding: 4px 12px; border-radius: 30px; font-weight: 700; display: inline-block; margin-top: 8px; }
        .card { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid var(--border-color); border-radius: 20px; padding: 24px; margin: 16px 0; text-align: left; }
        .card-title { margin: 0 0 16px 0; font-size: 14px; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; }
        .balance-box { text-align: center; padding: 10px 0; }
        .balance-text { font-size: 42px; font-weight: 800; }
        label { font-size: 12px; color: var(--text-secondary); font-weight: 700; display: block; margin-bottom: 6px; text-transform: uppercase; }
        .address-text { font-size: 11px; color: #e2e8f0; background-color: rgba(15, 23, 42, 0.8); padding: 12px; border-radius: 10px; word-break: break-all; font-family: 'JetBrains Mono', monospace; }
        .btn { background: linear-gradient(135deg, var(--accent-blue), #1d4ed8); color: white; padding: 15px; border: none; border-radius: 12px; width: 100%; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 12px; }
        .btn-outline { background: transparent; border: 1px solid rgba(148, 163, 184, 0.3); color: var(--text-primary); }
        .btn-buy { background: linear-gradient(135deg, var(--accent-green), #059669); }
        input { width: 100%; padding: 14px; margin: 6px 0 16px 0; background-color: rgba(15, 23, 42, 0.6); color: white; border: 1px solid rgba(148, 163, 184, 0.2); border-radius: 10px; box-sizing: border-box; }
        .secret-box { background: rgba(239, 68, 68, 0.08); border: 1px solid rgba(239, 68, 68, 0.25); padding: 16px; border-radius: 12px; font-size: 12px; color: #fca5a5; word-break: break-all; font-family: 'JetBrains Mono', monospace; margin-top: 15px; display: none; line-height: 1.6; }
    </style>
</head>
<body>
<div class="container">
    <div class="brand-section">
        <div class="logo-symbol">⬡</div>
        <div class="header-title">PROSPERA NETWORK</div>
        <span class="badge-l1">POST-QUANTUM LAYER 1</span>
    </div>

    <div class="card">
        <div class="card-title">Available Balance</div>
        <div class="balance-box">
            <span class="balance-text" id="balance-display">0.00</span>
            <span style="color: var(--accent-cyan); font-weight:600;">$PRSP</span>
        </div>
        <label>Public Wallet Address</label>
        <div class="address-text" id="address-display" style="color: var(--text-secondary); text-align: center;">No wallet active. Please interact below.</div>
        <div class="secret-box" id="secret-display"></div>
    </div>

    <div class="card" style="border: 1px solid var(--accent-green);">
        <div class="card-title" style="color: var(--accent-green);">Fair Launch Token Sale</div>
        <p style="font-size: 13px; color: var(--text-secondary); margin: 0 0 15px 0;">Price: 1 USDT (BSC) = 100 $PRSP.</p>
        <button class="btn btn-outline" style="margin-bottom: 12px;" onclick="connectMetaMask()">🔗 Connect MetaMask / Trust Wallet</button>
        <label>Your Receiving prsp1... Address</label>
        <input type="text" id="prospera-buy-destination" placeholder="Enter your prsp1... wallet to receive coins">
        <label>Amount of USDT to Spend</label>
        <input type="number" id="usdt-buy-amount" placeholder="0.00">
        <button class="btn btn-buy" onclick="prosesPembelianOtomatis()">💸 Buy $PRSP Now</button>
    </div>

    <div style="padding: 0 4px;">
        <button class="btn" onclick="createNewWallet()">✨ Create Secure Wallet</button>
    </div>
</div>

<script>
    let currentPrivateKey = "";
    let currentAddress = "";
    let userAccounts = [];
    
    const dompetPenampungDuitAnda = "0x1c8546c93ffd69515b450f518156dd29f9ee552b"; 
    const alamatUSDT_BSC = "0x55d398326f99059fF775485246999027B3197955";

    async function connectMetaMask() {
        if (!window.ethereum) return alert("Buka website ini dari browser bawaan MetaMask!");
        try {
            try {
                await window.ethereum.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: '0x38' }],
                });
            } catch (switchError) {
                if (switchError.code === 4902) {
                    await window.ethereum.request({
                        method: 'wallet_addEthereumChain',
                        params: [{
                            chainId: '0x38',
                            chainName: 'BNB Smart Chain Mainnet',
                            nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 },
                            rpcUrls: ['https://binance.org'],
                            blockExplorerUrls: ['https://bscscan.com']
                        }],
                    });
                }
            }

            userAccounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            alert("Dompet Pembeli Terhubung di Jaringan BSC: " + userAccounts);
        } catch (err) {
            alert("Koneksi gagal atau ditolak: " + err.message);
        }
    }

    async function prosesPembelianOtomatis() {
        if (!window.ethereum || userAccounts.length === 0) {
            return alert("Harap hubungkan dompet MetaMask Anda terlebih dahulu!");
        }
        
        const usdtInput = document.getElementById('usdt-buy-amount').value;
        const alamatProspera = document.getElementById('prospera-buy-destination').value;
        
        if(!usdtInput || !alamatProspera) return alert("Harap isi semua kolom!");

        try {
            const bscAmount = parseFloat(usdtInput);
            const valueBigInt = BigInt(Math.floor(bscAmount * 1000000)) * BigInt(1000000000000);
            const amountHex = valueBigInt.toString(16).padStart(64, '0');

            const cleanTargetAddress = dompetPenampungDuitAnda.toLowerCase().replace("0x", "").padStart(64, '0');
            const payloadData = "0xa9059cbb" + cleanTargetAddress + amountHex;

            alert("Memproses konfirmasi pengiriman USDT (BSC)...");

            await window.ethereum.request({
                method: 'eth_sendTransaction',
                params: [{
                    from: userAccounts[0],
                    to: alamatUSDT_BSC,
                    data: payloadData,
                    value: "0x0"
                }],
            });
            
            await pemicuKirimKoinKeNode(alamatProspera, usdtInput);

        } catch (err) {
            alert("Transaksi batal atau gagal: " + err.message);
        }
    }

    async function pemicuKirimKoinKeNode(tujuan, jumlah) {
        try {
            const res = await fetch('/api/kirim-koin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ address: tujuan, amount: jumlah })
            });
            const hasil = await res.json();
            if(hasil.success) {
                alert("Selamat! Pembelian Sukses. Koin $PRSP asli diantrekan otomatis ke dompet Anda.");
            }
        } catch(e) {
            alert("Pembayaran USDT sukses masuk ke dev! Koin asli akan dikirim manual saat node online.");
        }
    }

    function createNewWallet() {
        try {
            const array = new Uint8Array(16);
            window.crypto.getRandomValues(array);
            let tokenAcak = "";
            for (let i = 0; i < array.length; i++) {
                tokenAcak += array[i].toString(16).padStart(2, '0');
            }
            currentPrivateKey = "prsp_priv_" + tokenAcak;
            currentAddress = "prsp1" + tokenAcak.substring(0, 32);
            document.getElementById("address-display").innerText = currentAddress;
            const secretBox = document.getElementById("secret-display");
            secretBox.style.display = "block";
            secretBox.innerHTML = "<span style='color:var(--accent-red); font-weight:700;'>⚠️ SECURITY WARNING:</span><br>Back up private key:<br><br><span style='color:white; font-weight:500;'>" + currentPrivateKey + "</span>";
        } catch (e) {
            alert("Error buat wallet: " + e.message);
        }
    }
</script>
</body>
</html>
