<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prospera Blockchain Pre-Sale & Faucet</title>
    <style>
        body {
            background-color: #030712;
            font-family: 'Inter', sans-serif;
            color: #f3f4f6;
            margin: 0;
            padding: 16px;
        }
        .card-web3 {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        .btn-connect {
            width: 100%;
            background: transparent;
            color: #10b981;
            border: 2px solid #10b981;
            padding: 14px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-connect:hover {
            background: rgba(16, 185, 129, 0.1);
        }
        .btn-buy {
            width: 100%;
            background: #10b981;
            color: #030712;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
            transition: transform 0.2s ease;
        }
        .btn-buy:hover {
            transform: scale(1.02);
        }
        .input-web3 {
            width: 100%;
            background: #1f2937;
            border: 1px solid #374151;
            color: #fff;
            padding: 14px;
            border-radius: 8px;
            margin-top: 8px;
            margin-bottom: 16px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div style="text-align: center; margin-bottom: 32px;">
        <h1 style="color: #fff; font-size: 24px; margin-bottom: 4px;">Jaringan Prospera</h1>
        <span style="background: rgba(16, 185, 129, 0.15); color: #10b981; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold;">
            LAPISAN PASCA-KUANTUM 1
        </span>
    </div>

    <div class="card-web3" style="text-align: center;">
        <span style="color: #9ca3af; font-size: 12px; letter-spacing: 1px;">SALDO TERSEDIA</span>
        <h2 style="font-size: 40px; margin: 8px 0; color: #fff;">0,00 <span style="color: #10b981; font-size: 24px;">$PRSP</span></h2>
        <p id="address-display" style="color: #6b7280; font-size: 13px; margin: 0;">Dompet tidak aktif. Buat dompet baru di bawah ini.</p>
        <div id="secretBox" style="display:none; margin-top:10px; background:#1e1b4b; padding:10px; border-radius:8px; word-break:break-all;"></div>
    </div>

    <div class="card-web3">
        <h3 style="color: #10b981; margin-top: 0; font-size: 16px; text-transform: uppercase;">🚰 Prospera Testnet Faucet</h3>
        <p style="color: #9ca3af; font-size: 14px; margin-bottom: 20px;">Dapatkan koin uji coba gratis langsung ke node blockchain Anda di Termux.</p>

        <button class="btn-connect" style="margin-bottom: 20px;" onclick="createNewWallet()">
            🔑 Buat Dompet Aman Baru
        </button>

        <label style="color: #d1d5db; font-size: 13px;">Alamat Penerimaan Prospera Anda (prsp1...)</label>
        <input type="text" id="alamatProspera" class="input-web3" placeholder="Masukkan alamat prsp1... Anda">

        <button class="btn-buy" onclick="pemicuKirimKoinKeNode()">
            🚀 Klaim 100 $PRSP Gratis
        </button>
    </div>

    <script>
        let currentAddress = "";

        function createNewWallet() {
            try {
                const array = new Uint8Array(16);
                window.crypto.getRandomValues(array);
                let tokenAcak = "";
                for (let i = 0; i < array.length; i++) {
                    tokenAcak += array[i].toString(16).padStart(2, '0');
                }
                let currentPrivateKey = "prsp_priv_" + tokenAcak;
                currentAddress = "prsp1" + tokenAcak.substring(0, 12);
                
                document.getElementById("address-display").innerText = "Alamat Anda: " + currentAddress;
                document.getElementById("alamatProspera").value = currentAddress;
                
                const secretBox = document.getElementById("secretBox");
                secretBox.style.display = "block";
                secretBox.innerHTML = "<span style='color:#ef4444; font-weight:bold;'>Simpan Kunci Privat Anda:</span><br>" + currentPrivateKey;
            } catch (e) {
                alert("Error buat wallet: " + e.message);
            }
        }

        function pemicuKirimKoinKeNode() {
            const tujuan = document.getElementById("alamatProspera").value;
            if (!tujuan) {
                alert("Silakan masukkan alamat dompet Anda terlebih dahulu!");
                return;
            }

            // Alamat jembatan lokal komputer/HP Termux Anda
            const BACKEND_URL = 'https://lhr.life';

            fetch(BACKEND_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ address: tujuan })
            })
            .then(res => {
                if (!res.ok) {
                    return res.json().then(err => { throw new Error(err.error || "Gagal mengambil koin.") });
                }
                return res.json();
            })
            .then(hasil => {
                if(hasil.success) {
                    alert("Selamat! Pengambilan koin gratis berhasil. Periksa node Termux Anda.");
                }
            })
            .catch(e => {
                alert("Error: " + e.message);
            });
        }
    </script>
</body>
</html>
