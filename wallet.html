<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prospera Web Wallet</title>
    <style>
        body { 
            background-color: #0b0e14; 
            color: #ffffff; 
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; 
            text-align: center; 
            padding: 30px; 
            margin: 0; 
        }
        .container { 
            max-width: 450px; 
            margin: 60px auto auto auto; 
            background: #151a22; 
            padding: 30px; 
            border-radius: 16px; 
            border: 1px solid #00ffcc; 
            box-shadow: 0 4px 25px rgba(0,255,204,0.15); 
        }
        h2 { 
            color: #00ffcc; 
            letter-spacing: 1.5px; 
            margin-bottom: 5px; 
            font-size: 26px;
        }
        .tagline { 
            font-size: 11px; 
            color: #8b949e; 
            text-transform: uppercase; 
            margin-top: 0; 
            letter-spacing: 2px;
        }
        .balance-box { 
            background: #1f2631; 
            padding: 22px; 
            border-radius: 12px; 
            margin: 25px 0; 
            border-left: 4px solid #00ffcc;
        }
        .balance-title { 
            font-size: 12px; 
            color: #8b949e; 
            text-align: left;
            font-weight: bold;
        }
        .balance-amount { 
            font-size: 34px; 
            font-weight: bold; 
            color: #00ffcc; 
            margin: 10px 0; 
            text-align: left;
        }
        .address-box { 
            font-size: 11px; 
            background: #0b0e14; 
            padding: 12px; 
            border-radius: 8px; 
            word-break: break-all; 
            color: #c9d1d9; 
            border: 1px solid #30363d; 
            text-align: left;
        }
        .form-group {
            text-align: left;
            margin-bottom: 15px;
        }
        label {
            font-size: 13px;
            color: #8b949e;
            margin-left: 5px;
            display: block;
            margin-bottom: 5px;
        }
        input { 
            width: 94%; 
            padding: 12px; 
            background: #0b0e14; 
            border: 1px solid #30363d; 
            color: white; 
            border-radius: 8px; 
            font-size: 14px; 
        }
        input:focus { 
            border-color: #00ffcc; 
            outline: none; 
        }
        button { 
            width: 100%; 
            padding: 14px; 
            background: #00ffcc; 
            color: #0b0e14; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 16px; 
            cursor: pointer; 
            transition: 0.2s; 
            margin-top: 15px; 
            letter-spacing: 0.5px;
        }
        button:hover { 
            background: #00ccaa; 
            box-shadow: 0 0 10px rgba(0,255,204,0.4);
        }
        .status-node {
            font-size: 12px;
            color: #8b949e;
            margin-top: 20px;
        }
        .dot {
            height: 8px;
            width: 8px;
            background-color: #00ffcc;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>PROSPERA WALLET</h2>
        <p class="tagline">Post-Quantum Layer 1 Network</p>
        
        <div class="balance-box">
            <div class="balance-title">TOTAL SALDO</div>
            <div class="balance-amount"><span id="balance">0.00</span> PRSP</div>
            <div class="address-box">Alamat Anda: <br><strong id="wallet-addr">prsp1genesis_developer_pool</strong></div>
        </div>

        <hr style="border: 0; border-top: 1px solid #30363d; margin: 25px 0;">

        <div class="form-group">
            <label>Alamat Tujuan</label>
            <input type="text" id="target-addr" placeholder="Masukkan alamat prsp1...">
        </div>

        <div class="form-group">
            <label>Jumlah Koin</label>
            <input type="number" id="send-amount" placeholder="0.00">
        </div>

        <button onclick="kirimTransaksi()">Kirim Sekarang</button>
        
        <div class="status-node">
            <span class="dot" id="node-dot"></span> <span id="node-text">Menghubungkan ke Node Termux...</span>
        </div>
    </div>

    <script>
        // ⚠️ GANTI KODE DI BAWAH INI DENGAN LINK SSH TUNNEL TERMUX ANDA YANG AKTIF
        const URL_RPC = "https://1b273f0cafbea1.lhr.life";


        async function perbaruiSaldo() {
            try {
                // Menembak endpoint node Rust untuk mengambil saldo
                let res = await fetch(`${URL_RPC}/api/v1/balance?address=genesis`);
                if(res.ok) {
                    let data = await res.json();
                    document.getElementById("balance").innerText = data.balance || "1,200,000";
                    document.getElementById("node-dot").style.backgroundColor = "#00ffcc";
                    document.getElementById("node-text").innerText = "Terhubung ke Node Termux (Online)";
                }
            } catch (error) {
                console.error("Gagal membaca node blockchain:", error);
                // Jika offline / tunnel mati, tampilkan status error
                document.getElementById("balance").innerText = "1,200,000"; // Saldo default offline
                document.getElementById("node-dot").style.backgroundColor = "#ff4a4a";
                document.getElementById("node-text").innerText = "Node Termux Terputus / Offline";
            }
        }

        async function kirimTransaksi() {
            let ke = document.getElementById("target-addr").value;
            let total = document.getElementById("send-amount").value;
            
            if(!ke || !total) {
                return alert("Mohon isi alamat tujuan dan jumlah koin!");
            }
            
            try {
                // Mengirim instruksi transfer ke server Rust di Termux
                let response = await fetch(`${URL_RPC}/api/v1/transfer`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ to: ke, amount: parseFloat(total) })
                });
                
                if(response.ok) {
                    alert(`Transaksi Berhasil Disiarkan!\nMengirim ${total} PRSP ke ${ke}`);
                    perbaruiSaldo(); // Refresh saldo terbaru
                } else {
                    alert("Transaksi gagal diproses oleh node.");
                }
            } catch (err) {
                // Simulasi sukses jika frontend belum terhubung sempurna ke backend POST route
                alert(`[Simulasi] Transaksi Disiarkan!\nMengirim ${total} PRSP ke ${ke}`);
            }
        }

        // Jalankan pengecekan otomatis saat web wallet dibuka
        perbaruiSaldo();
    </script>
</body>
                                                                                                                     </html>
